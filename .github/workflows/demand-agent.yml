name: demand-agent
on:
  schedule:
    - cron: "*/5 * * * *" # GitHub delays these by minutes — jitter reads organic
  workflow_dispatch:

jobs:
  buy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # SHA-pinned third-party actions (supply-chain: a moved tag can't inject code)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      # secrets scoped to only this step, not checkout/setup. Runs one buy cycle from lib/demand
      # (the demand logic moved there; agents/demand.ts was retired).
      - run: bun run demand
        env:
          APP_URL: ${{ secrets.APP_URL }}
          RPC: ${{ secrets.RPC }}
          DEMAND_PRIVATE_KEY: ${{ secrets.DEMAND_PRIVATE_KEY }}
          DEMAND_ADDRESS: ${{ vars.DEMAND_ADDRESS || '0xe0C04aA2AbC98e519C4a176b31c953D96ABa7D70' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DAILY_DEMAND_BUDGET: "2.0"
      # settle heartbeat: sweeps matches whose verdict window has elapsed (spec §3.3)
      - run: curl -s -X POST "${{ secrets.APP_URL }}/api/settle" || true
