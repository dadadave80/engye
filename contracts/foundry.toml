[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# solc side (IthacaAccount): optimizer required to fit EIP-170 (35KB unoptimized)
optimizer = true
optimizer_runs = 200
# Arc targets Prague (docs.arc.network/arc/references/evm-compatibility) — compile at
# prague for CLZ support (user directive); applies to both vyper and solc.
evm_version = "prague"

# pinned toolchain: vyper 0.4.3+commit.bff19ea2
# gas-optimized, DEFAULT codegen: Arcscan's verifier schema cannot express Venom
# (experimentalCodegen silently dropped -> bytecode mismatch), and verified > venom.
# Revisit when the explorer's smart-contract-verifier upgrades.
[vyper]
path = "/Users/dadadave/.local/bin/vyper"
optimize = "gas"
